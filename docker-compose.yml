version: '3.8'

services:
  server:
    build: ./server
    container_name: traffic-server
    ports:
      - "5000:5000"
    networks:
      - app-network

  sender:
    build: ./sender
    container_name: traffic-sender
    depends_on:
      - server
    volumes:
      - ./data:/app/data
    networks:
      - app-network
    command: ["python", "sender.py", "10"]

  frontend:
    build: ./frontend
    container_name: traffic-frontend
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge